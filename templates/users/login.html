{% extends 'base.html' %}
{% block title %}Login — ReviewGuard{% endblock %}
{% block content %}
<style>
.auth-page { min-height: 88vh; display: flex; align-items: center; justify-content: center; padding: 3rem 1.5rem; }
.auth-card { width: 100%; max-width: 440px; }
.auth-header { text-align: center; margin-bottom: 2rem; }
.auth-header h1 { font-size: 2rem; margin-bottom: 0.4rem; }
.auth-header p { color: var(--muted); font-size: 0.9rem; }
.auth-logo { font-size: 2.5rem; color: var(--teal); margin-bottom: 1rem; }
.auth-footer { text-align: center; margin-top: 1.5rem; font-size: 0.875rem; color: var(--muted); }
.auth-footer a { color: var(--teal); text-decoration: none; }
.auth-footer a:hover { text-decoration: underline; }
.alert-notice {
    background: rgba(245,200,66,0.08); border: 1px solid rgba(245,200,66,0.25);
    border-radius: 8px; padding: 0.75rem 1rem;
    font-size: 0.82rem; color: var(--gold); margin-bottom: 1.5rem;
    display: flex; align-items: center; gap: 0.5rem;
}
</style>
<div class="auth-page">
    <div class="auth-card">
        <div class="card card-glow">
            <div class="auth-header">
                <div class="auth-logo"><i class="fas fa-lock"></i></div>
                <h1>Welcome Back</h1>
                <p>Sign in to your ReviewGuard account</p>
            </div>
            <div class="alert-notice">
                <i class="fas fa-info-circle"></i>
                Only registered users can sign in. <a href="/users/register/" style="color:var(--gold); text-decoration:underline">Create an account</a> first.
            </div>
            <form method="POST">
                {% csrf_token %}
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-input" placeholder="Your username" autofocus required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-input" placeholder="Your password" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; padding:0.8rem; font-size:0.95rem; margin-top:0.5rem">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
            </form>
        </div>
        <div class="auth-footer">
            Don't have an account? <a href="/users/register/">Register Now</a>
            &nbsp;·&nbsp; Admin? <a href="/admin-panel/login/">Admin Login</a>
        </div>
    </div>
</div>
{% endblock %}
